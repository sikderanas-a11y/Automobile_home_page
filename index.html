<title>Fleet Maintenance Management System</title>

  oilConsumption:     "https://script.google.com/macros/s/AKfycbw7YBrP0CUrq2Mj81jTpGpbo-cB3l_biWHoaVY9tN-ZC7CNuAW0e0yBm6CMjyZLR0GR/exec",

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper:    #F6F4EC;
    --ink:      #16202E;
    --ink-soft: #4B5A6B;
    --steel:    #0E7C86;
    --card-bg:  #FFFDF6;
    --shadow:   0 6px 16px rgba(22,32,46,0.10);
    --shadow-lg:0 10px 24px rgba(22,32,46,0.16);
    --radius:   14px;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --display: 'Oswald', 'Segoe UI', sans-serif;
    --body: 'Work Sans', 'Segoe UI', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--body);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
  }

  .shell {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 18px 14px 12px;
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
  }

  /* ─── Top Bar ─── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    background: rgba(246,244,236,0.88);
    border-bottom: 2px solid var(--ink);
    border-radius: 10px 10px 0 0;
    gap: 10px;
    flex-wrap: wrap;
    margin: 0 -14px;
    padding-left: 14px;
    padding-right: 14px;
  }

  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--display);
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--ink);
    text-transform: uppercase;
  }

  .topbar-logo svg { flex-shrink: 0; }

  .clock-pill {
    background: var(--ink);
    border: 2px solid var(--ink);
    border-radius: 4px;
    padding: 7px 14px;
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 700;
    color: #FF9F1C;
    letter-spacing: 0.02em;
    white-space: nowrap;
    text-align: center;
  }

  /* ─── Hero Eyebrow (Fleet Operations Control) ─── */
  .hero-eyebrow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: #0A5A62;
    text-transform: uppercase;
    margin: 18px auto 16px;
    background: rgba(14,124,134,0.08);
    border: 1px solid rgba(14,124,134,0.35);
    padding: 6px 16px;
    border-radius: 50px;
    width: fit-content;
  }

  .hero-eyebrow .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--steel);
    animation: pulse-dot 1.5s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.35; transform: scale(0.7); }
  }

  /* ─── Cards Grid: fixed 4 columns, rows auto-adjust ─── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    flex: 1;
    align-content: start;
  }

  .mod-card {
    position: relative;
    background: var(--card-bg);
    border: 2px solid var(--ink);
    border-radius: 12px;
    text-decoration: none;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    opacity: 0;
    transform: translateY(14px);
  }

  .mod-card.visible {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.4s ease, transform 0.4s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }

  .mod-card:active {
    transform: scale(0.94);
    box-shadow: var(--shadow-lg);
    border-color: var(--steel);
  }

  .card-icon-wrap {
    width: 46%;
    height: 46%;
    max-width: 42px;
    max-height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-icon-wrap svg { width: 100%; height: 100%; }

  /* Placeholder letter icon */
  .card-letter {
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(0.95rem, 4.5vw, 1.3rem);
    letter-spacing: 0.02em;
  }

  /* Card label (small caption below icon, minimal) */
  .card-label {
    position: absolute;
    bottom: 4px;
    left: 0; right: 0;
    text-align: center;
    font-family: var(--mono);
    font-size: 0.52rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 0 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-icon-wrap { margin-top: -8px; }

  /* Ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(14,124,134,0.22);
    transform: scale(0);
    animation: ripple-anim 0.5s linear;
    pointer-events: none;
    z-index: 3;
  }

  @keyframes ripple-anim {
    to { transform: scale(3.2); opacity: 0; }
  }

  /* ─── Footer: only credit line, bottom-right ─── */
  footer {
    text-align: center;
    padding: 14px 4px 6px;
    color: var(--ink-soft);
    font-size: 0.68rem;
    font-family: var(--mono);
    letter-spacing: 0.02em;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }

  a:focus-visible, button:focus-visible {
    outline: 3px solid var(--steel);
    outline-offset: 2px;
  }
</style>
</head>
<body>

<div class="shell">

  <!-- ── Top Bar ── -->
  <header class="topbar">
    <div class="topbar-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="var(--ink)"/>
        <path d="M5 19 L9 11 L14 17 L18 9 L23 19" stroke="#FF9F1C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="14" cy="21.5" r="1.8" fill="#0E7C86"/>
      </svg>
      Automobile &mdash; XiC
    </div>
    <div class="clock-pill" id="clock">Loading…</div>
  </header>

  <div class="hero-eyebrow"><span class="dot"></span>Fleet Operations Control</div>

  <!-- ── Module Cards ── -->
  <div class="cards-grid" id="cardsGrid">

    <!-- Filter Consumption -->
    <a class="mod-card" href="#" onclick="navigate(event,'filterConsumption')" aria-label="Filter Consumption">
      <div class="card-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0E7C86" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>

      </div>
      <span class="card-label">Filter</span>

    <!-- Oil Consumption -->
    <a class="mod-card" href="#" onclick="navigate(event,'oilConsumption')" aria-label="Oil Consumption">
      <div class="card-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#E08600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
      <span class="card-label">Oil</span>

    <!-- Battery Consumption -->
    <a class="mod-card" href="#" onclick="navigate(event,'batteryConsumption')" aria-label="Battery Consumption">
      <div class="card-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#E0483E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="18" height="11" rx="2"/>
          <path d="M22 11v3M7 12h10"/>
          <path d="M11 10v4"/>

      </div>
      <span class="card-label">Battery</span>

    <!-- Tyre Consumption -->
    <a class="mod-card" href="#" onclick="navigate(event,'tyreConsumption')" aria-label="Tyre Consumption">
      <div class="card-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#16202E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2" x2="12" y2="8"/>
          <line x1="12" y1="16" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="8" y2="12"/>

    <!-- Engine Overhauling -->
    <a class="mod-card" href="#" onclick="navigate(event,'engineOverhauling')" aria-label="Engine Overhauling">
      <div class="card-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#FF9F1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
      </div>
      <span class="card-label">Engine</span>

    <!-- Vehicle Status (new, no dedicated icon → placeholder letters) -->
    <a class="mod-card" href="#" onclick="navigate(event,'vehicleStatus')" aria-label="Vehicle Status">
      <div class="card-icon-wrap" style="background:rgba(14,124,134,0.10); border-radius:10px;">
        <span class="card-letter" style="color:#0E7C86">VS</span>
      </div>
      <span class="card-label">Vehicle Status</span>

    <!-- Mechanic Working History (new, no dedicated icon → placeholder letters) -->
    <a class="mod-card" href="#" onclick="navigate(event,'mechanicHistory')" aria-label="Mechanic Working History">
      <div class="card-icon-wrap" style="background:rgba(224,72,62,0.10); border-radius:10px;">
        <span class="card-letter" style="color:#E0483E">MH</span>

      <span class="card-label">Mechanic History</span>

  </div>

  <!-- ── Footer ── -->
  <footer>A concept and property of ROM</footer>

</div><!-- /shell -->

<script>
// ─── Clock ───────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  const day = days[now.getDay()];
  const date = now.getDate();
  const month = months[now.getMonth()];
  const year = now.getFullYear();
  document.getElementById('clock').textContent =
    `${day}, ${date} ${month} ${year}  •  ${h}:${m}:${s}`;
}
updateClock();
setInterval(updateClock, 1000);

// ─── Navigation ──────────────────────────────────────────
function navigate(e, key) {
  e.preventDefault();
  const url = URLS[key];
  if (url && url !== '#') {
    window.open(url, '_blank');
  }
  // ripple
  const card = e.currentTarget;
  const rect = card.getBoundingClientRect();
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const size = Math.max(rect.width, rect.height) * 1.3;
  ripple.style.cssText = `
    width:${size}px; height:${size}px;
    left:${(e.clientX || rect.left + rect.width/2) - rect.left - size/2}px;
    top:${(e.clientY || rect.top + rect.height/2) - rect.top - size/2}px;
  `;
  card.appendChild(ripple);
  setTimeout(() => ripple.remove(), 520);
}

// ─── Reveal cards ─────────────────────────────────────────
const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    if (entry.isIntersecting) {
      const el = entry.target;
      setTimeout(() => { el.classList.add('visible'); }, parseInt(el.dataset.delay || 0));
      observer.unobserve(el);
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.mod-card').forEach((c, i) => {
  c.dataset.delay = i * 50;
  observer.observe(c);
});
</script>
</body>
